openapi: 3.0.3
info:
  title: Premium Store API Architecture Contract
  version: 2.0.0
  description: Combined API specification detailing the dual-layer architecture (Strapi CMS Headless API + Commerce Express API Gateway) powering the Next.js Storefront.
paths:
  # ========================================================
  # CMS DATA LAYER (STRAPI)
  # ========================================================
  /api/products:
    get:
      summary: Retrieve all published products
      description: Fetches products with relations (images, categories). Supports advanced filtering via query parameters.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrapiResponse"
  /api/categories:
    get:
      summary: Retrieve all product categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrapiResponse"
  /api/blog-posts:
    get:
      summary: Retrieve blog posts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrapiResponse"

  # ========================================================
  # COMMERCE GATEWAY LAYER (EXPRESS)
  # ========================================================
  /api/v1/auth/register:
    post:
      summary: User Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                fullName: { type: string }
      responses:
        "201":
          description: CREATED
  /api/v1/auth/login:
    post:
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: OK with JWT token
  /api/v1/checkout/bkash/create:
    post:
      summary: Initiate bKash Payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: number }
                cart_items: { type: array }
                shipping_address: { type: object }
      responses:
        "200":
          description: Returns paymentID and redirectURL
  /api/v1/checkout/bkash/execute:
    post:
      summary: Execute bKash Payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentID: { type: string }
      responses:
        "200":
          description: Payment successful, Order generated in Strapi
  /api/v1/wishlist:
    get:
      summary: Retrieve user mapped wishlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Returns array of wishlist items
  /api/v1/wishlist/toggle:
    post:
      summary: Add or remove product from wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_strapi_id: { type: integer }
      responses:
        "200":
          description: Toggled successfully
  /api/v1/coupons/validate:
    post:
      summary: Validate a discount code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                cart_total: { type: number }
      responses:
        "200":
          description: Returns discount valid payload

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    StrapiResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          type: object
